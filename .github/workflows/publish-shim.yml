name: Publish deprecation shim

# One-shot, manually-triggered: publishes the workspace-repo-map v0.2.1
# deprecation-pointer release (points old users at index-graph). Removed
# after a single successful run.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-shim:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build and upload the v0.2.1 deprecation shim
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd shim
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
          python -m twine upload --non-interactive dist/*
